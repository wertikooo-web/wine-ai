<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 1140" width="320" height="1140">
  <defs>
    <linearGradient id="roseGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4c9cf"/>
      <stop offset="0.18" stop-color="#e8a3ad"/>
      <stop offset="0.5" stop-color="#d8818e"/>
      <stop offset="0.82" stop-color="#c05f6c"/>
      <stop offset="1" stop-color="#9c4351"/>
    </linearGradient>
    <linearGradient id="roseCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e7c98a"/>
      <stop offset="0.5" stop-color="#c9a35b"/>
      <stop offset="1" stop-color="#8f7238"/>
    </linearGradient>
    <linearGradient id="roseLabel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf7ef"/>
      <stop offset="1" stop-color="#f2e6d4"/>
    </linearGradient>
    <radialGradient id="roseShine" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="1140" fill="#100b0d"/>
  <!-- neck -->
  <path d="M132 0 h56 v150 c0 24 14 34 14 60 v40 h-84 v-40 c0-26 14-36 14-60 z" fill="url(#roseCap)"/>
  <rect x="128" y="26" width="64" height="18" fill="#7c6230"/>
  <!-- shoulder + body -->
  <path d="M118 250
           c-4 40 -46 80 -46 190
           v560
           c0 46 34 84 88 84
           c54 0 88 -38 88 -84
           v-560
           c0 -110 -42 -150 -46 -190
           z" fill="url(#roseGlass)"/>
  <!-- shine -->
  <ellipse cx="118" cy="520" rx="46" ry="360" fill="url(#roseShine)"/>
  <!-- label -->
  <rect x="70" y="560" width="180" height="240" rx="6" fill="url(#roseLabel)" stroke="#c9a35b" stroke-width="2"/>
  <text x="160" y="620" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#7f2843" letter-spacing="1">CODRU</text>
  <text x="160" y="656" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#7f2843" letter-spacing="1">ROSÉ</text>
  <line x1="100" y1="678" x2="220" y2="678" stroke="#c9a35b" stroke-width="1.5"/>
  <text x="160" y="710" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#a15a68" letter-spacing="3">VIN ROZ SEC</text>
  <text x="160" y="762" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#9c7a4a">Crama Dealul de Aur</text>
</svg>
