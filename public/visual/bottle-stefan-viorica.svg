<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 1140" width="320" height="1140">
  <defs>
    <linearGradient id="whiteGlass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dfe8c8"/>
      <stop offset="0.18" stop-color="#c3d29e"/>
      <stop offset="0.5" stop-color="#9db072"/>
      <stop offset="0.82" stop-color="#748550"/>
      <stop offset="1" stop-color="#4c5934"/>
    </linearGradient>
    <linearGradient id="whiteCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0e2b0"/>
      <stop offset="0.5" stop-color="#d8bd6f"/>
      <stop offset="1" stop-color="#a08239"/>
    </linearGradient>
    <linearGradient id="whiteLabel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fefdf8"/>
      <stop offset="1" stop-color="#f4efdd"/>
    </linearGradient>
    <radialGradient id="whiteShine" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="1140" fill="#100b0d"/>
  <!-- neck -->
  <path d="M132 0 h56 v150 c0 24 14 34 14 60 v40 h-84 v-40 c0-26 14-36 14-60 z" fill="url(#whiteCap)"/>
  <rect x="128" y="26" width="64" height="18" fill="#8a7130"/>
  <!-- shoulder + body -->
  <path d="M118 250
           c-4 40 -46 80 -46 190
           v560
           c0 46 34 84 88 84
           c54 0 88 -38 88 -84
           v-560
           c0 -110 -42 -150 -46 -190
           z" fill="url(#whiteGlass)"/>
  <!-- shine -->
  <ellipse cx="118" cy="520" rx="46" ry="360" fill="url(#whiteShine)"/>
  <!-- label -->
  <rect x="70" y="560" width="180" height="240" rx="6" fill="url(#whiteLabel)" stroke="#d8bd6f" stroke-width="2"/>
  <text x="160" y="614" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#5a6a3c" letter-spacing="1">ȘTEFAN VODĂ</text>
  <text x="160" y="656" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#5a6a3c" letter-spacing="1">VIORICA</text>
  <line x1="100" y1="678" x2="220" y2="678" stroke="#d8bd6f" stroke-width="1.5"/>
  <text x="160" y="710" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#7c8a5c" letter-spacing="3">VIN ALB SEC</text>
  <text x="160" y="762" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8f8250">Vinăria Ștefan</text>
</svg>
